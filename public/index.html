<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CircleChess · Puzzle Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #F1EDE4;
  --surface:     #FAF6EB;
  --card:        #FFFFFF;
  --card-raised: #FFFFFF;
  --border:      #E8E0D0;
  --border-hi:   #D1AB41;
  --gold:        #FACF47;
  --gold-dim:    #D1AB41;
  --gold-glow:   rgba(250,207,71,.18);
  --gold-glow2:  rgba(250,207,71,.09);
  --amber:       #E17846;
  --text:        #262322;
  --text-muted:  #6b5f58;
  --text-dim:    #a89890;
  --chip-bg:     rgba(250,207,71,.18);
  --chip-border: rgba(209,171,65,.4);
  --input-bg:    #FAF6EB;
  --radius:      10px;
  --radius-lg:   16px;
  --shadow:      0 2px 12px rgba(38,35,34,.08);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 60px;
}

/* ── HEADER ── */
header {
  border-bottom: 1px solid var(--border);
  background: #262322;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--gold), var(--amber));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 0 18px rgba(250,207,71,.28);
}

.logo-text {
  display: flex; flex-direction: column; gap: 1px;
}

.logo-name {
  font-size: 16px; font-weight: 700;
  color: #FACF47;
  letter-spacing: -.3px;
}

.logo-sub {
  font-size: 11px; color: #888280; font-weight: 500;
  letter-spacing: .5px; text-transform: uppercase;
}

/* ── MAIN ── */
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 36px 24px 0;
}

/* ── SECTION TITLE ── */
.section-title {
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow);
}

/* ── FILTER GRID ── */
.filter-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.filter-grid .span2 { grid-column: span 2; }

@media (max-width: 640px) {
  .filter-grid { grid-template-columns: 1fr; }
  .filter-grid .span2 { grid-column: span 1; }
}

/* ── FIELD ── */
.field { display: flex; flex-direction: column; gap: 8px; }

.field-label {
  font-size: 12px; font-weight: 600;
  color: var(--text-muted);
  letter-spacing: .4px;
  text-transform: uppercase;
}

/* ── INPUT ── */
.input {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 10px 14px;
  width: 100%;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}

.input::placeholder { color: var(--text-dim); }

.input:focus {
  border-color: var(--gold-dim);
  box-shadow: 0 0 0 3px var(--gold-glow);
}

input[type="number"].input {
  -moz-appearance: textfield;
}
input[type="number"].input::-webkit-outer-spin-button,
input[type="number"].input::-webkit-inner-spin-button { -webkit-appearance: none; }

/* ── DROPDOWN ── */
.dropdown { position: relative; }

.dropdown-list {
  position: absolute;
  top: calc(100% + 6px);
  left: 0; right: 0;
  background: var(--card-raised);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius);
  max-height: 220px;
  overflow-y: auto;
  z-index: 50;
  box-shadow: 0 12px 40px rgba(0,0,0,.6);
  scrollbar-width: thin;
  scrollbar-color: var(--border-hi) transparent;
}

.dropdown-list::-webkit-scrollbar { width: 4px; }
.dropdown-list::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }

.dropdown-item {
  padding: 9px 14px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text);
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}

.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: var(--gold-glow); color: #4D3F37; font-weight: 500; }

/* ── CHIPS ── */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 6px;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--chip-bg);
  border: 1px solid var(--chip-border);
  color: #4D3F37;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 999px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}

.chip:hover { background: rgba(232,184,75,.22); border-color: var(--gold-dim); }

.chip-x {
  font-size: 10px;
  opacity: .7;
  line-height: 1;
}

/* ── RATING ROW ── */
.rating-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 10px;
}

.rating-sep {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  white-space: nowrap;
}

/* ── CLEAR BADGE ── */
.opening-wrap {
  position: relative;
}

.clear-btn {
  position: absolute;
  right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 0;
  display: none;
}

.clear-btn.visible { display: block; }

/* ── ACTIONS ── */
.actions {
  display: flex;
  gap: 12px;
  align-items: center;
  margin-top: 4px;
}

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: inherit;
  font-size: 14px; font-weight: 600;
  padding: 11px 22px;
  border-radius: var(--radius);
  border: none; cursor: pointer;
  transition: all .18s;
  letter-spacing: .1px;
}

.btn-primary {
  background: #FACF47;
  color: #262322;
  box-shadow: 0 2px 10px rgba(250,207,71,.4);
}

.btn-primary:hover {
  transform: translateY(-1px);
  background: #fbd84e;
  box-shadow: 0 4px 18px rgba(250,207,71,.5);
}

.btn-primary:active { transform: translateY(0); }

.btn-primary:disabled {
  opacity: .5; cursor: not-allowed; transform: none;
  box-shadow: none;
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
}

.btn-outline:hover {
  border-color: var(--gold-dim);
  color: #4D3F37;
  background: var(--gold-glow2);
}

.btn-outline:disabled { opacity: .4; cursor: not-allowed; }

/* ── SPINNER ── */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(38,35,34,.2);
  border-top-color: #262322;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── OUTPUT SECTION ── */
.output-section { margin-top: 24px; }

.output-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.output-meta {
  display: flex;
  align-items: center;
  gap: 10px;
}

.badge {
  background: var(--chip-bg);
  border: 1px solid var(--chip-border);
  color: #4D3F37;
  font-size: 11px; font-weight: 600;
  padding: 3px 10px;
  border-radius: 999px;
  letter-spacing: .3px;
}

.output-actions { display: flex; gap: 8px; }

.output-card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.output-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 23px,
    var(--border) 23px,
    var(--border) 24px
  );
  opacity: .5;
  pointer-events: none;
}

textarea#output {
  position: relative;
  display: block;
  width: 100%;
  height: 340px;
  background: transparent;
  border: none;
  color: #4D3F37;
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 12.5px;
  line-height: 24px;
  padding: 16px 18px;
  resize: none;
  outline: none;
  scrollbar-width: thin;
  scrollbar-color: var(--border-hi) transparent;
}

textarea#output::-webkit-scrollbar { width: 6px; }
textarea#output::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }
textarea#output::placeholder { color: var(--text-dim); font-family: inherit; }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 14px;
  color: var(--text-dim);
}

.empty-icon { font-size: 48px; opacity: .4; }
.empty-text { font-size: 14px; text-align: center; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px; right: 28px;
  background: #262322;
  border: 1px solid #3d3835;
  color: #FAF6EB;
  font-size: 13px; font-weight: 500;
  padding: 12px 20px;
  border-radius: var(--radius);
  box-shadow: 0 8px 28px rgba(0,0,0,.5);
  transform: translateY(20px);
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
  z-index: 200;
}

.toast.show { transform: translateY(0); opacity: 1; }

/* ── DIVIDER ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}
</style>
</head>
<body>

<header>
  <div class="logo-icon">♞</div>
  <div class="logo-text">
    <span class="logo-name">CircleChess</span>
    <span class="logo-sub">Puzzle Generator</span>
  </div>
</header>

<main>

  <!-- FILTERS -->
  <div class="section-title">Filters</div>
  <div class="card">

    <div class="filter-grid">

      <!-- THEMES -->
      <div class="field span2 dropdown">
        <label class="field-label">Themes</label>
        <input id="themeInput" class="input" placeholder="Type to search — fork, pin, backRankMate…" autocomplete="off" />
        <div id="themeList" class="dropdown-list" hidden></div>
        <div id="themeChips" class="chips"></div>
      </div>

      <!-- OPENING -->
      <div class="field span2 dropdown">
        <label class="field-label">Opening</label>
        <div class="opening-wrap">
          <input id="openingInput" class="input" placeholder="Search opening…" autocomplete="off" />
          <button id="openingClear" class="clear-btn" title="Clear">×</button>
        </div>
        <div id="openingList" class="dropdown-list" hidden></div>
      </div>

      <!-- RATING -->
      <div class="field">
        <label class="field-label">Rating range</label>
        <div class="rating-row">
          <input type="number" id="minRating" class="input" value="800" min="0" max="3000" placeholder="Min">
          <span class="rating-sep">—</span>
          <input type="number" id="maxRating" class="input" value="2000" min="0" max="3000" placeholder="Max">
        </div>
      </div>

      <!-- COUNT -->
      <div class="field">
        <label class="field-label">Number of puzzles</label>
        <input type="number" id="count" class="input" value="20" min="1" max="500" placeholder="20">
      </div>

    </div>

    <div class="divider"></div>

    <div class="actions">
      <button class="btn btn-primary" id="generateBtn" onclick="generate()">
        <div class="spinner" id="spinner"></div>
        <span id="generateLabel">Generate PGN</span>
      </button>
      <button class="btn btn-outline" id="downloadBtn" onclick="download()" disabled>
        ↓ Download .pgn
      </button>
    </div>

  </div>

  <!-- OUTPUT -->
  <div class="output-section">
    <div class="output-header">
      <div class="output-meta">
        <span class="section-title" style="margin:0">Output</span>
        <span class="badge" id="countBadge" hidden>0 puzzles</span>
      </div>
      <div class="output-actions">
        <button class="btn btn-outline" id="copyBtn" onclick="copyPgn()" disabled style="padding:8px 14px;font-size:13px">
          Copy
        </button>
      </div>
    </div>

    <div class="output-card" id="outputCard">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">♟</div>
        <div class="empty-text">Set your filters and click <strong style="color:var(--gold)">Generate PGN</strong></div>
      </div>
      <textarea id="output" placeholder="" hidden></textarea>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
let THEMES = [], OPENINGS = [];
let selectedThemes = [];
let selectedOpening = '';

/* ── INIT ── */
async function loadFilters() {
  try {
    const res = await fetch('/api/filters');
    const data = await res.json();
    THEMES = data.themes || [];
    OPENINGS = data.openings || [];
    setupThemeSearch();
    setupOpeningSearch();
  } catch(e) {
    showToast('Failed to load filters');
  }
}

/* ── THEME SEARCH ── */
function setupThemeSearch() {
  const input = document.getElementById('themeInput');
  const list  = document.getElementById('themeList');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    list.innerHTML = '';
    if (!q) { list.hidden = true; return; }

    const matches = THEMES.filter(t => t.toLowerCase().includes(q)).slice(0, 50);
    matches.forEach(t => {
      const d = document.createElement('div');
      d.className = 'dropdown-item';
      d.textContent = t;
      d.onmousedown = e => {
        e.preventDefault();
        if (!selectedThemes.includes(t)) { selectedThemes.push(t); renderChips(); }
        input.value = '';
        list.hidden = true;
      };
      list.appendChild(d);
    });
    list.hidden = !matches.length;
  });

  input.addEventListener('blur', () => { setTimeout(() => list.hidden = true, 150); });
}

function renderChips() {
  const wrap = document.getElementById('themeChips');
  wrap.innerHTML = '';
  selectedThemes.forEach(t => {
    const c = document.createElement('div');
    c.className = 'chip';
    c.innerHTML = `${t}<span class="chip-x">✕</span>`;
    c.onclick = () => {
      selectedThemes = selectedThemes.filter(x => x !== t);
      renderChips();
    };
    wrap.appendChild(c);
  });
}

/* ── OPENING SEARCH ── */
function setupOpeningSearch() {
  const input = document.getElementById('openingInput');
  const list  = document.getElementById('openingList');
  const clear = document.getElementById('openingClear');

  function renderList(filter = '') {
    list.innerHTML = '';
    const q = filter.toLowerCase();
    const matches = (q ? OPENINGS.filter(o => o.toLowerCase().includes(q)) : OPENINGS).slice(0, 80);
    matches.forEach(o => {
      const d = document.createElement('div');
      d.className = 'dropdown-item';
      d.textContent = o;
      d.onmousedown = e => {
        e.preventDefault();
        selectedOpening = o;
        input.value = o;
        list.hidden = true;
        clear.classList.add('visible');
      };
      list.appendChild(d);
    });
    list.hidden = !matches.length;
  }

  input.addEventListener('focus', () => renderList(input.value));
  input.addEventListener('input', () => renderList(input.value));
  input.addEventListener('blur', () => { setTimeout(() => list.hidden = true, 150); });

  clear.addEventListener('click', () => {
    selectedOpening = '';
    input.value = '';
    clear.classList.remove('visible');
    input.focus();
  });

  document.addEventListener('click', e => {
    if (!input.contains(e.target) && !list.contains(e.target)) list.hidden = true;
  });
}

/* ── GENERATE ── */
async function generate() {
  const btn      = document.getElementById('generateBtn');
  const spinner  = document.getElementById('spinner');
  const label    = document.getElementById('generateLabel');

  btn.disabled = true;
  spinner.style.display = 'block';
  label.textContent = 'Generating…';

  try {
    const params = new URLSearchParams({
      themes:    JSON.stringify(selectedThemes),
      openings:  selectedOpening,
      minRating: document.getElementById('minRating').value,
      maxRating: document.getElementById('maxRating').value,
      count:     document.getElementById('count').value
    });

    const res  = await fetch('/api/pgn?' + params);
    const text = await res.text();

    const count = (text.match(/\[Event /g) || []).length;
    showOutput(text, count);
    if (count === 0) showToast('No puzzles matched your filters');
  } catch(e) {
    showToast('Error generating PGN');
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    label.textContent = 'Generate PGN';
  }
}

function showOutput(text, count) {
  const empty  = document.getElementById('emptyState');
  const ta     = document.getElementById('output');
  const badge  = document.getElementById('countBadge');
  const dlBtn  = document.getElementById('downloadBtn');
  const cpBtn  = document.getElementById('copyBtn');

  empty.style.display = 'none';
  ta.hidden = false;
  ta.value = text;

  badge.textContent = `${count} puzzle${count !== 1 ? 's' : ''}`;
  badge.hidden = false;

  dlBtn.disabled = !text;
  cpBtn.disabled = !text;
}

/* ── DOWNLOAD ── */
function download() {
  const ta = document.getElementById('output');
  if (!ta.value) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([ta.value], { type: 'text/plain' }));
  a.download = 'circlechess_puzzles.pgn';
  a.click();
}

/* ── COPY ── */
async function copyPgn() {
  const ta = document.getElementById('output');
  if (!ta.value) return;
  try {
    await navigator.clipboard.writeText(ta.value);
    showToast('Copied to clipboard ✓');
  } catch {
    ta.select();
    document.execCommand('copy');
    showToast('Copied to clipboard ✓');
  }
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadFilters();
</script>
</body>
</html>
